name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /root/.openclaw/skills/search/scripts
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            /root/.local/bin/poetry lock 2>/dev/null || true
            /root/.local/bin/poetry install --no-interaction
            echo "✅ Deployed $(git log --oneline -1)"

      - name: Trigger AgentSkills deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: CognitioLab/AgentSkills
          event-type: scraper-updated
